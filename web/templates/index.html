<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Test Runner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-light">

<div id="loading-overlay">
    <div class="spinner-border text-light" style="width:3rem; height:3rem;" role="status"></div>
    <p class="text-white fs-5 mb-0">Тесты запущены, пожалуйста подождите…</p>
</div>
<div class="container py-5" style="max-width: 640px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Test Runner</h1>
        <a href="/history" class="btn btn-outline-secondary btn-sm">История запусков</a>
    </div>

    <!-- Запустить все тесты -->
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Запустить все тесты</h5>
            <p class="card-text text-muted small">Прогоняет все {{ tests|length }} тестов в tests/test_eventswidget.py</p>
            <form method="post" action="/run">
                <input type="hidden" name="test_name" value="all">
                <button type="submit" class="btn btn-primary">Запустить все</button>
            </form>
        </div>
    </div>

    <!-- Запустить конкретный тест -->
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Запустить конкретный тест</h5>
            <form method="post" action="/run">
                <div class="mb-3">
                    <select name="test_name" class="form-select">
                        {% for test in tests %}
                        <option value="{{ test }}">{{ test }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-outline-primary">Запустить</button>
            </form>
        </div>
    </div>
</div>
<script>
    document.querySelectorAll("form").forEach(function (form) {
        form.addEventListener("submit", function () {
            document.getElementById("loading-overlay").classList.add("active");
        });
    });
</script>
</body>
</html>
